name: Devicepinvault
options:
  bundleIdPrefix: com.shimondeitel.devicepinvault
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Devicepinvault:
    type: application
    platform: iOS
    sources:
      - path: Devicepinvault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.devicepinvault
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Devicepinvault/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DevicepinvaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DevicepinvaultTests
      - path: Devicepinvault.storekit
    dependencies:
      - target: Devicepinvault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.devicepinvault.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DevicepinvaultUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DevicepinvaultUITests
    dependencies:
      - target: Devicepinvault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.devicepinvault.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Devicepinvault:
    build:
      targets:
        Devicepinvault: all
        DevicepinvaultTests: [test]
        DevicepinvaultUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Devicepinvault.storekit
    test:
      config: Debug
      storeKitConfiguration: Devicepinvault.storekit
      targets:
        - DevicepinvaultTests
        - DevicepinvaultUITests
    archive:
      config: Release
